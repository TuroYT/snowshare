version: "3.8"

services:
  db-e2e:
    image: postgres:15-alpine
    container_name: snowshare-e2e-db
    environment:
      POSTGRES_USER: e2e_user
      POSTGRES_PASSWORD: e2e_password
      POSTGRES_DB: e2e_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e_user -d e2e_db"]
      interval: 5s
      timeout: 5s
      retries: 5
