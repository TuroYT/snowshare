name: "CI"

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: [self-hosted]
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run type-check

  test:
    name: Test
    runs-on: [self-hosted]
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test -- --ci --coverage --coverageReporters=text-summary

  build:
    name: Docker Build
    needs: [lint, test]
    runs-on: [self-hosted]
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
