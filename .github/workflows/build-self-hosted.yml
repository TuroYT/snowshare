name: "CI"

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: [self-hosted]
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: [self-hosted]
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test -- --ci --coverage --coverageReporters=text-summary

  e2e:
    name: E2E Tests
    needs: [lint, test]
    runs-on: [self-hosted]
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: bash e2e/run-e2e.sh
      - name: Upload Robot Framework results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e/results/

  build:
    name: Docker Build
    needs: [lint, test]
    runs-on: [self-hosted]
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
